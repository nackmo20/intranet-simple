function downloadText(filename, text, type = 'application/json') { const blob = new Blob([text], { type }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = filename; a.click(); setTimeout(() => URL.revokeObjectURL(url), 1000); }

function isExplicitDelete(value) { return EXPLICIT_DELETE_MARKERS.includes(String(value || '').trim()); }

  const incoming = unique(Array.isArray(values) ? values : [values]);
  const current = unique(before);
  if (!TAXONOMY_OPERATIONS.includes(op)) throw new Error(`Opération taxonomique inconnue: ${op}`);
  if (op === 'add') return unique([...current, ...incoming]);

  if (op === 'delete' && !isExplicitDelete(requestedValue)) throw new Error('Suppression non explicite');

}

function publicTreeHtml(ids, attr, pageId='', nodes=PUBLIC_TREE, path=[]) { const selected=new Set(ids||[]); return nodes.map(normalizePublicNode).map(node=>{const next=[...path,node.label], id=slugify(next.join(' ')); const cb=`<label><input type="checkbox" ${attr}="${escapeHtml(id)}" ${pageId?`data-public-page="${pageId}"`:''} ${selected.has(id)?'checked':''}> ${escapeHtml(node.label)} <small>${escapeHtml(next.join(' > '))}</small></label>`; return node.children.length ? `<details open><summary>${cb}</summary>${publicTreeHtml(ids,attr,pageId,node.children,next)}</details>` : `<div>${cb}</div>`;}).join(''); }
function renderCreationEdits() { const c=ensureCreationWorkspace(), dates=c.drupal.defaultDates; return `<h2>Modifications</h2><section class="workflow"><h3>Paramètres Drupal obligatoires</h3><label>Thématique globale <select data-creation="theme"><option value="">-- choisir --</option>${THEMES.map(t=>`<option value="${escapeHtml(t)}" ${c.drupal.theme===t?'selected':''}>${escapeHtml(t)}</option>`).join('')}</select></label><label>Date début préinscription <input data-creation="preinscriptionStartDate" value="${escapeHtml(dates.preinscriptionStartDate)}" placeholder="jj/mm/aaaa"></label><label>Date dépublication <input data-creation="unpublishDate" value="${escapeHtml(dates.unpublishDate)}" placeholder="jj/mm/aaaa"></label><details open><summary>Publics globaux (${(c.drupal.publics||[]).length})</summary>${publicTreeHtml(c.drupal.publics,'data-global-public')}</details></section>${filteredRows().map(p=>{const a=getAssociation(p.canonicalId), edits=c.edits[p.canonicalId]||{}, useGlobal=c.courseUseGlobalPublics[p.canonicalId]!==false, pubIds=selectedPublicIdsForPage(p); const fields=['title','objective','body','accessibility','headcount','totalDuration','inPersonDuration','remoteDuration','editorialPublic','prerequisites','contact','chapo']; return `<details class="card"><summary>${escapeHtml(p.sourceTitle)} — ${useGlobal?'utilise les publics globaux':`${pubIds.length} publics spécifiques`}</summary>${renderDepartmentControls(p)}<p><label>Thématique spécifique <select data-course-theme="${p.canonicalId}"><option value="">Utiliser la thématique globale</option>${THEMES.map(t=>`<option value="${escapeHtml(t)}" ${c.courseThemes[p.canonicalId]===t?'selected':''}>${escapeHtml(t)}</option>`).join('')}</select></label></p><p><button data-course-public-specific="${p.canonicalId}">Utiliser des publics spécifiques</button><button data-course-public-global="${p.canonicalId}">Revenir aux publics globaux</button></p>${!useGlobal?`<details><summary>${pubIds.length} publics spécifiques</summary>${publicTreeHtml(pubIds,'data-course-public',p.canonicalId)}</details>`:''}<h4>Association manuelle</h4><label>Code dispositif <input data-assoc="dispositifCode" data-page="${p.canonicalId}" value="${escapeHtml(a.dispositifCode)}"></label><label>Libellé dispositif <input data-assoc="dispositifLabel" data-page="${p.canonicalId}" value="${escapeHtml(a.dispositifLabel)}"></label><button data-validate-assoc="${p.canonicalId}">Valider association</button><button data-add-module="${p.canonicalId}">Ajouter module vide</button><button data-add-4dept="${p.canonicalId}">Ajouter les 4 lignes départementales</button>${(a.modules||[]).map((m,i)=>`<div><strong>Module ${i+1}</strong> <small>Clé technique: ${escapeHtml(moduleTechnicalKey(a,m))}</small><br>${['moduleCode','moduleLabel','territoireCode','territoireLabel','groupCode','groupLabel','rne','lieu'].map(f=>`<input placeholder="${f}" data-module-field="${f}" data-page="${p.canonicalId}" data-module-index="${i}" value="${escapeHtml(m[f]||'')}">`).join('')}<input placeholder="lien préinscription" data-module-field="preinscription.link" data-page="${p.canonicalId}" data-module-index="${i}" value="${escapeHtml(m.preinscription?.link||'')}"><button data-dup-module="${p.canonicalId}" data-module-index="${i}">Dupliquer</button><button data-del-module="${p.canonicalId}" data-module-index="${i}">Supprimer</button><button data-move-module="${p.canonicalId}" data-module-index="${i}" data-dir="-1">↑</button><button data-move-module="${p.canonicalId}" data-module-index="${i}" data-dir="1">↓</button></div>`).join('')}<h4>Contenus</h4>${fields.map(f=>`<label>${f}<textarea data-edit-field="${f}" data-page="${p.canonicalId}">${escapeHtml(edits[f]??getSourceContent(p,f))}</textarea><small>Source: ${escapeHtml(getSourceContent(p,f)).slice(0,160)}</small><button data-restore-field="${f}" data-page="${p.canonicalId}">Restaurer OVP</button></label>`).join('')}</details>`}).join('')}`; }
function renderCreationPreview() { const variants=getDrupalExportVariants(); return `<h2>Prévisualisation Drupal</h2>${variants.map(v=>{const item=buildDrupalCreateItem(v), corrections=correctionEntries(v); return `<div class="card"><h3>${escapeHtml(item.title)}</h3><p>ID OVP ${escapeHtml(item.sourceOvpId)} · Département ${escapeHtml(item.departmentCode||'non dupliqué')} ${escapeHtml(item.departmentLabel)} · mode ${escapeHtml(v.duplicationMode)}</p><p>Dispositif ${escapeHtml(item.dispositifCode)} — modules ${item.modules.length} · Thématique ${escapeHtml(item.theme||'non sélectionnée')} · Publics ${item.publics.length} (${item.publics.length===(ensureCreationWorkspace().drupal.publics||[]).length?'globaux':'spécifiques'})</p><p>Dates Drupal ${escapeHtml(JSON.stringify(item.defaultDates))}</p><p>Alertes: ${escapeHtml([item.studio.chapoWarning,!getSourceContent(v.page,'accessibility')?'accessibilité par défaut':''].filter(Boolean).join('; '))}</p><details open><summary>Corrections éditoriales appliquées (${corrections.filter(e=>!e.disabled).length})</summary>${corrections.map(e=>`<div><strong>${escapeHtml(e.field)}</strong> (${e.count})<br>Avant: ${escapeHtml(e.before)}<br>Corrigé: ${escapeHtml(e.corrected)}<br><button data-correction-key="${escapeHtml(e.key)}" data-correction-disabled="${e.disabled?'0':'1'}">${e.disabled?'Réappliquer':'Annuler'}</button></div>`).join('')||'Aucune'}</details><div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem"><div><h4>Rendu Drupal</h4><h1>${escapeHtml(item.title)}</h1><p><strong>Chapô:</strong> ${escapeHtml(item.chapo)}</p><article>${item.html}</article></div><div><h4>Données exportées</h4><pre>${escapeHtml(item.html)}</pre><pre>${escapeHtml(JSON.stringify(item,null,2))}</pre></div></div><button data-copy-html="${escapeHtml(v.key)}">Copier le HTML</button><button data-download-html="${escapeHtml(v.key)}">Télécharger le HTML</button><button data-copy-json="${escapeHtml(v.key)}">Copier le JSON</button><button data-remove-variant="${escapeHtml(v.key)}">Retirer cette variante de l’export</button></div>`}).join('')||'<p>Aucune variante active.</p>'}${Object.keys(ensureCreationWorkspace().removedVariants).map(k=>`<button data-restore-variant="${escapeHtml(k)}">Restaurer variante ${escapeHtml(k)}</button>`).join('')}`; }
function renderCreationControls() { const r=creationChecks(); return `<h2>Contrôles de création</h2><p>${r.errors.length} erreur(s), ${r.warnings.length} avertissement(s)</p>${r.errors.map(e=>`<p class="error">⛔ ${escapeHtml(e.variant)} — ${escapeHtml(e.message)}</p>`).join('')}${r.warnings.map(e=>`<p class="warning">⚠️ ${escapeHtml(e.variant)} — ${escapeHtml(e.message)}</p>`).join('')||'<p class="ok">Aucune alerte.</p>'}`; }
function renderCreationExport() { const r=creationChecks(), payload=buildCreatePagesPayload(), job=buildJob(ws); return `<h2>Export création Drupal</h2>${r.blocking?'<p class="error">Export create_pages bloqué par les contrôles.</p>':'<p class="ok">Export create_pages disponible.</p>'}<button data-action="download-create-payload" ${r.blocking?'disabled':''}>Télécharger payload-create-pages.json</button><button data-action="download-studio-create-job">Télécharger studio-create-job.json</button><h3>payload-create-pages.json</h3><pre>${escapeHtml(JSON.stringify(payload,null,2))}</pre><h3>studio-create-job.json</h3><pre>${escapeHtml(JSON.stringify(job,null,2))}</pre>`; }
function renderCreateMain() { ensureCreationWorkspace(); const key=creationStepKey(); if(key==='import') return renderCreateImport(); if(key==='controls') return renderCreateFileControls(); if(key==='matches') return renderCreationMatches(); if(key==='edits') return renderCreationEdits(); if(key==='preview') return renderCreationPreview(); if(key==='creation-controls') return renderCreationControls(); return renderCreationExport(); }
const oldRender = render;
render = function() { document.querySelectorAll('[data-workflow]').forEach(b => b.classList.toggle('active', b.dataset.workflow === ws.currentWorkflow)); renderSteps(); if(ws.currentWorkflow===WORKFLOWS.create){ ensureCreationWorkspace(); renderStatus(); document.getElementById('sources').innerHTML = renderCreateMain(); document.getElementById('filters').innerHTML = ''; document.getElementById('table').innerHTML = ''; document.getElementById('removed').innerHTML = ''; renderSide(firstActivePage()); document.getElementById('export').innerHTML = ''; } else { renderWorkflow(); renderStatus(); renderSources(); renderFilters(); renderTable(); renderRemoved(); renderSide(firstActivePage()); renderExport(); } document.querySelectorAll('.advanced-only').forEach(el => el.style.display = ws.advanced ? '' : 'none'); };
const oldRecompute = recompute;
recompute = function() { ensureCreationWorkspace(); oldRecompute(); };
const oldOnInput = onInput;
onInput = function(e) { const c=ensureCreationWorkspace(); if(e.target.dataset.creation==='sofiaSearch'){ c.sofiaSearch=e.target.value; saveWorkspace(ws); render(); return; } oldOnInput(e); };
function mutateCreation(label, fn){ withUndo(ws,label,s=>{ ensureCreationWorkspace(s); fn(s.creation,s); }); recompute(); render(); }
const oldOnChange = onChange;
onChange = function(e) { const c=ensureCreationWorkspace(); if(e.target.dataset.creation){ mutateCreation('creation_setting', cr=>{ if(e.target.dataset.creation==='theme') cr.drupal.theme=e.target.value; else cr.drupal.defaultDates[e.target.dataset.creation]=e.target.value; }); return; } if(e.target.dataset.globalPublic){ mutateCreation('creation_global_public', cr=>{ const ids=new Set(cr.drupal.publics||[]); e.target.checked?ids.add(e.target.dataset.globalPublic):ids.delete(e.target.dataset.globalPublic); cr.drupal.publics=[...ids]; }); return; } if(e.target.dataset.coursePublic){ mutateCreation('creation_course_public', cr=>{ const id=e.target.dataset.publicPage; cr.courseUseGlobalPublics[id]=false; const ids=new Set(cr.coursePublicSelections[id]||cr.drupal.publics||[]); e.target.checked?ids.add(e.target.dataset.coursePublic):ids.delete(e.target.dataset.coursePublic); cr.coursePublicSelections[id]=[...ids]; }); return; } if(e.target.dataset.courseTheme){ mutateCreation('creation_course_theme', cr=>{ if(e.target.value) cr.courseThemes[e.target.dataset.courseTheme]=e.target.value; else delete cr.courseThemes[e.target.dataset.courseTheme]; }); return; } if(e.target.dataset.assoc){ mutateCreation('creation_assoc', cr=>{ const a=getAssociation(e.target.dataset.page); a[e.target.dataset.assoc]=e.target.value; a.status='manual'; a.locked=true; }); return; } if(e.target.dataset.moduleField){ mutateCreation('creation_module', cr=>{ const a=getAssociation(e.target.dataset.page), m=a.modules[Number(e.target.dataset.moduleIndex)] ||= normalizeCreationModule(); if(e.target.dataset.moduleField==='preinscription.link') m.preinscription.link=e.target.value; else m[e.target.dataset.moduleField]=e.target.value; a.status='manual'; a.locked=true; }); return; } if(e.target.dataset.editField){ mutateCreation('creation_edit', cr=>{ cr.edits[e.target.dataset.page] ||= {}; cr.edits[e.target.dataset.page][e.target.dataset.editField]=e.target.value; }); return; } if(e.target.dataset.deptPage){ mutateCreation('creation_dept', cr=>{ const ids=new Set(cr.departmentSelections[e.target.dataset.deptPage]||[]); e.target.checked?ids.add(e.target.dataset.deptCode):ids.delete(e.target.dataset.deptCode); cr.departmentSelections[e.target.dataset.deptPage]=[...ids]; }); return; } if(e.target.dataset.dupMode){ mutateCreation('creation_duplication', cr=>{ cr.duplicationModes[e.target.dataset.dupMode]=e.target.value; }); return; } oldOnChange(e); };
const oldOnClick = onClick;
onClick = function(e) { const a=e.target.dataset.action; if(a==='creation-sofia'){ pendingSlot='create_sofia'; document.getElementById('files').click(); return; } if(e.target.dataset.applySofia){ mutateCreation('creation_apply_sofia', cr=>{ const g=creationSofiaGroups().find(x=>x.dispositifCode===e.target.dataset.sofiaDis); if(g){ cr.associations[e.target.dataset.applySofia]={ status:'manual', locked:true, dispositifCode:g.dispositifCode, dispositifLabel:g.dispositifLabel, modules:g.modules.map(normalizeCreationModule) }; } }); return; } if(e.target.dataset.validateAssoc){ mutateCreation('creation_validate_assoc', cr=>{ getAssociation(e.target.dataset.validateAssoc).status='validated'; getAssociation(e.target.dataset.validateAssoc).locked=true; }); return; } if(e.target.dataset.addModule){ mutateCreation('creation_add_module', cr=>{ const a=getAssociation(e.target.dataset.addModule); a.modules.push(normalizeCreationModule()); a.status='manual'; a.locked=true; }); return; } if(e.target.dataset.add4dept){ mutateCreation('creation_add_4dept', cr=>{ const a=getAssociation(e.target.dataset.add4dept); for(const d of ACADEMIE_DEPARTMENTS){ if(!a.modules.some(m=>m.territoireCode===d.code)) a.modules.push(normalizeCreationModule({territoireCode:d.code, territoireLabel:d.label, moduleLabel:d.label})); } cr.duplicationModes[e.target.dataset.add4dept]='all'; a.status='manual'; a.locked=true; }); return; } if(e.target.dataset.delModule){ mutateCreation('creation_delete_module', cr=>{ getAssociation(e.target.dataset.delModule).modules.splice(Number(e.target.dataset.moduleIndex),1); }); return; } if(e.target.dataset.dupModule){ mutateCreation('creation_duplicate_module', cr=>{ const a=getAssociation(e.target.dataset.dupModule), m=a.modules[Number(e.target.dataset.moduleIndex)]; if(m) a.modules.splice(Number(e.target.dataset.moduleIndex)+1,0,JSON.parse(JSON.stringify(m))); }); return; } if(e.target.dataset.moveModule){ mutateCreation('creation_move_module', cr=>{ const a=getAssociation(e.target.dataset.moveModule), i=Number(e.target.dataset.moduleIndex), j=i+Number(e.target.dataset.dir); if(a.modules[j]) [a.modules[i],a.modules[j]]=[a.modules[j],a.modules[i]]; }); return; } if(e.target.dataset.restoreField){ mutateCreation('creation_restore_field', cr=>{ if(cr.edits[e.target.dataset.page]) delete cr.edits[e.target.dataset.page][e.target.dataset.restoreField]; }); return; } if(e.target.dataset.coursePublicSpecific){ mutateCreation('creation_public_specific', cr=>{ cr.courseUseGlobalPublics[e.target.dataset.coursePublicSpecific]=false; cr.coursePublicSelections[e.target.dataset.coursePublicSpecific]=[...(cr.drupal.publics||[])]; }); return; } if(e.target.dataset.coursePublicGlobal){ mutateCreation('creation_public_global', cr=>{ cr.courseUseGlobalPublics[e.target.dataset.coursePublicGlobal]=true; delete cr.coursePublicSelections[e.target.dataset.coursePublicGlobal]; }); return; } if(e.target.dataset.correctionKey){ mutateCreation('creation_correction', cr=>{ if(e.target.dataset.correctionDisabled==='1') cr.correctionDisabled[e.target.dataset.correctionKey]=true; else delete cr.correctionDisabled[e.target.dataset.correctionKey]; }); return; } if(e.target.dataset.removeVariant){ mutateCreation('creation_remove_variant', cr=>{ cr.removedVariants[e.target.dataset.removeVariant]=true; }); return; } if(e.target.dataset.restoreVariant){ mutateCreation('creation_restore_variant', cr=>{ delete cr.removedVariants[e.target.dataset.restoreVariant]; }); return; } if(e.target.dataset.copyHtml||e.target.dataset.copyJson){ const v=getDrupalExportVariants().find(x=>x.key===(e.target.dataset.copyHtml||e.target.dataset.copyJson)); if(v) navigator.clipboard?.writeText(e.target.dataset.copyHtml?buildDrupalCreateItem(v).html:JSON.stringify(buildDrupalCreateItem(v),null,2)); return; } if(e.target.dataset.downloadHtml){ const v=getDrupalExportVariants().find(x=>x.key===e.target.dataset.downloadHtml); if(v) downloadText(`page-${v.key}.html`, buildDrupalCreateItem(v).html, 'text/html'); return; } if(a==='download-create-payload'){ downloadText('payload-create-pages.json', JSON.stringify(buildCreatePagesPayload(),null,2)); return; } if(a==='download-studio-create-job'){ downloadText('studio-create-job.json', JSON.stringify(buildJob(ws),null,2)); return; } oldOnClick(e); };
const oldBuildJob = buildJob;
buildJob = function(s) { if(s.currentWorkflow===WORKFLOWS.create){ const payload=buildCreatePagesPayload(); return { schemaVersion: SCHEMA_VERSION, jobId: uid('job'), generatedAt: nowIso(), studioVersion: STUDIO_VERSION, workflow: s.currentWorkflow, legacyCreatePayload: payload, targets: payload.items.map(item=>({canonicalId:item.studio.canonicalId, variantKey:item.studio.variantKey, operations:[{field:'create_pages_item',op:'add',values:item}]})) }; } return oldBuildJob(s); };

mount(document.getElementById('app'));
</script></body></html>
