function keywordSimilarity(a,b){const A=getWords(a),B=getWords(b);if(!A.size||!B.size)return 0;let c=0;A.forEach(w=>B.has(w)&&c++);return c/Math.max(A.size,B.size);}
function levenshteinDistance(a,b){a=normalizeTitle(a);b=normalizeTitle(b);const m=a.length,n=b.length;const dp=Array.from({length:m+1},()=>Array(n+1).fill(0));for(let i=0;i<=m;i++)dp[i][0]=i;for(let j=0;j<=n;j++)dp[0][j]=j;for(let i=1;i<=m;i++){for(let j=1;j<=n;j++){dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1));}}return dp[m][n];}

function scoreSofiaMatch(ovpCourse,sofiaItem){const modulesText=(sofiaItem.modules||[]).map(m=>m.moduleLabel||"").join(" ");const d=0.45*Math.max(keywordSimilarity(ovpCourse.title,sofiaItem.dispositifLabel),levenshteinSimilarity(ovpCourse.title,sofiaItem.dispositifLabel));const m=0.35*Math.max(keywordSimilarity(ovpCourse.title,modulesText),levenshteinSimilarity(ovpCourse.title,modulesText));const dep=(ovpCourse.deployment.level1&&sofiaItem.deploymentLevel&&ovpCourse.deployment.level1.toLowerCase()===sofiaItem.deploymentLevel.toLowerCase())?0.10:0;const kw=0.10*keywordSimilarity(ovpCourse.content.objectif+" "+ovpCourse.content.contenu,sofiaItem.dispositifLabel+" "+modulesText);let score=d+m+dep+kw;if((ovpCourse.deployment.level1||"").toLowerCase().includes("département")&&(sofiaItem.modules||[]).length>=4)score+=0.05;return Math.min(1,score);}
function findBestMatches(ovpCourse,sofiaGroups,limit=3){return sofiaGroups.map(group=>({group,score:scoreSofiaMatch(ovpCourse,group)})).sort((a,b)=>b.score-a.score).slice(0,limit);}

function runQualityChecks(){const out=[];const dates=getDefaultDates();const startDate=parseFrenchDate(dates.preinscriptionStartDate);const unpublishDate=parseFrenchDate(dates.unpublishDate);if(!appState.settings.theme)out.push({level:"erreur",course:"Global",message:"Thématique non sélectionnée",action:"Sélectionner une thématique avant export"});if(!getSelectedPublics().length)out.push({level:"erreur",course:"Global",message:"Aucun public sélectionné",action:"Cocher au moins un public"});if(!dates.preinscriptionStartDate)out.push({level:"erreur",course:"Global",message:"Date de début de préinscription absente",action:"Renseigner la date"});if(!dates.unpublishDate)out.push({level:"erreur",course:"Global",message:"Date de dépublication absente",action:"Renseigner la date"});if(startDate&&unpublishDate&&unpublishDate<startDate)out.push({level:"erreur",course:"Global",message:"Date de dépublication antérieure à la date de début de préinscription",action:"Corriger les dates"});for(const c of appState.normalizedCourses){const a=appState.associations.find(x=>x.ovpId===c.ovpId);if(!a?.sofia?.dispositifCode)out.push({level:"erreur",course:c.title,message:"Parcours sans dispositif",action:"Associer un dispositif"});if(!(a?.sofia?.modules||[]).length)out.push({level:"erreur",course:c.title,message:"Parcours sans module",action:"Ajouter un module"});for(const m of (a?.sofia?.modules||[])){if(!validateModuleCode(m.moduleCode))out.push({level:"erreur",course:c.title,message:"Module sans code",action:"Renseigner moduleCode (mapping externe uniquement)"});if((c.deployment.level1||"").toLowerCase().includes("département")&&!m.territoireCode)out.push({level:"alerte",course:c.title,message:"Module sans territoire",action:"Renseigner territoire"});if((m.preinscription?.status||"").toLowerCase().includes("ouvert")&&!m.preinscription?.link)out.push({level:"alerte",course:c.title,message:"Préinscription ouverte sans lien",action:"Ajouter lien"});}
if(c.hours.presentiel+c.hours.distanciel!==c.hours.total)out.push({level:"alerte",course:c.title,message:"Incohérence durée",action:"Vérifier heures"});
if(!getChapoText(c))out.push({level:"alerte",course:c.title,message:"Contenu vide",action:"Compléter course.meta.contenu"});
if(!getContactText(c))out.push({level:"alerte",course:c.title,message:"Contact vide",action:"Compléter course.meta.contact"});
if(isDefaultAccessibilityUsed(c))out.push({level:"info",course:c.title,message:"Accessibilité remplacée par la phrase par défaut",action:"Vérifier si une mention spécifique est nécessaire"});
const depts=getCourseDepartments(c);const duplicationMode=getCourseDuplicationMode(c);if(isDepartmentalTagged(c)&&!depts.length)out.push({level:"erreur",course:c.title,message:"Titre départementalisé sans département sélectionné",action:"Sélectionner le ou les départements concernés"});if(isBiDepartmentalTagged(c)&&depts.length!==2)out.push({level:"erreur",course:c.title,message:"Formation bi-départementale avec moins ou plus de deux départements",action:"Sélectionner exactement deux départements"});if(duplicationMode==="bi"&&(depts.length<2||depts.length%2!==0))out.push({level:"erreur",course:c.title,message:"Duplication bidépartementale incomplète",action:"Sélectionner les départements par groupes de deux"});
if((c.deployment.level1||"").toLowerCase().includes("département")&&(a?.sofia?.modules||[]).length&&!detectDepartmentalModules(a.sofia.modules))out.push({level:"info",course:c.title,message:"4 départements non complets",action:"Ajouter 16/17/79/86 si nécessaire"});
if(a?.sofia?.dispositifCode&&!validateDispositifCode(a.sofia.dispositifCode))out.push({level:"erreur",course:c.title,message:"Code dispositif invalide",action:"Corriger code dans le mapping externe"});
}
checkDuplicateAssociations().forEach(k=>out.push({level:"erreur",course:"Global",message:`Doublon ${k}`,action:"Supprimer doublon"}));
const map=appState.drupalSofiaMapping;if(map?.drupalRows?.length){const byDrupal=new Map(),bySofia=new Map();map.validatedMappings.forEach(v=>{byDrupal.set(v.drupalParcoursId,(byDrupal.get(v.drupalParcoursId)||0)+1);const key=`${v.sofia?.dispositifCode||""}|${v.sofia?.moduleCode||""}`;bySofia.set(key,(bySofia.get(key)||0)+1);if(!v.sofia?.dispositifCode)out.push({level:"erreur",course:v.drupalTitle,message:"Code dispositif Sofia-FMO vide",action:"Compléter le mapping externe"});if(!v.sofia?.moduleCode)out.push({level:"erreur",course:v.drupalTitle,message:"Code module Sofia-FMO vide",action:"Compléter le mapping externe"});if((v.match?.score||0)<map.settings.probableThreshold)out.push({level:"alerte",course:v.drupalTitle,message:"Association Drupal ↔ Sofia avec score faible",action:"Vérifier manuellement"});});map.drupalRows.forEach(r=>{if(!r.drupalTitle)out.push({level:"erreur",course:r.drupalParcoursId,message:"Titre Drupal vide",action:"Corriger le tableau Drupal"});if(!map.validatedMappings.some(v=>v.drupalParcoursId===r.drupalParcoursId))out.push({level:"alerte",course:r.drupalTitle||r.drupalParcoursId,message:"Parcours Drupal sans association Sofia-FMO",action:"Valider une association"});});map.sofiaRows.forEach(r=>{if(!r.combinedTitle)out.push({level:"alerte",course:r.dispositifCode||r.moduleCode,message:"Titre Sofia-FMO vide",action:"Corriger le tableau Sofia"});});byDrupal.forEach((count,id)=>{const mode=map.drupalRows.find(r=>r.drupalParcoursId===id)?.mappingMode||"single";if(count>1&&mode==="single")out.push({level:"erreur",course:id,message:"Même parcours Drupal associé à plusieurs modules Sofia-FMO",action:"Passer en multi_module ou departmental"});});bySofia.forEach((count,key)=>{if(key!=="|"&&count>1)out.push({level:"alerte",course:"Mapping Drupal ↔ Sofia-FMO",message:`Même couple dispositif/module associé à plusieurs parcours Drupal (${key})`,action:"Vérifier les doublons"});});getSofiaGroupPreinscriptionAlerts(map.sofiaRows).forEach(a=>out.push({level:a.level,course:"Mapping Drupal ↔ Sofia-FMO",message:a.message,action:"Vérifier les colonnes Lieu et UAI ; passer le mapping en departmental si confirmé"}));getSofiaLocationGroupCoverageAlerts(map.sofiaRows,map.validatedMappings).forEach(a=>out.push({level:a.level,course:"Mapping BI-RANA",message:a.message,action:"Ajouter/valider les ID Drupal manquants ou corriger les lieux Sofia-FMO"}));getSofiaLocationGroupCoverageAlerts(appState.sofiaRows,map.validatedMappings).forEach(a=>out.push({level:a.level,course:"Plan et sessions Sofia-FMO",message:a.message,action:"Ajouter/valider autant d’ID Drupal que de groupes/lieux Sofia-FMO"}));getMappingExportBlockers().forEach(message=>out.push({level:"erreur",course:"Export mapping",message,action:"Importer Plan et sessions et vérifier les départements dans les titres Drupal"}));}getSofiaGroupPreinscriptionAlerts(appState.sofiaRows).forEach(a=>out.push({level:a.level,course:"Import Sofia-FMO",message:a.message,action:"Vérifier les colonnes Lieu et UAI ; traiter comme formation départementale au niveau des groupes"}));
return out;}

function bindExportSettings(container=document){const theme=container.querySelector("#themeSelect");if(theme)theme.onchange=e=>{appState.settings.theme=e.target.value;renderAll();};const start=container.querySelector("#preinscriptionStartDate");if(start)start.onchange=e=>{appState.settings.defaultDates={...getDefaultDates(),preinscriptionStartDate:e.target.value};renderAll();};const unpublish=container.querySelector("#unpublishDate");if(unpublish)unpublish.onchange=e=>{appState.settings.defaultDates={...getDefaultDates(),unpublishDate:e.target.value};renderAll();};container.querySelectorAll("input[data-public-id]").forEach(cb=>cb.onchange=e=>{const ids=new Set(appState.settings.selectedPublicIds||[]);if(e.target.checked)ids.add(e.target.dataset.publicId);else ids.delete(e.target.dataset.publicId);appState.settings.selectedPublicIds=[...ids];renderAll();});container.querySelectorAll("input[data-course-public-id]").forEach(cb=>cb.onchange=e=>{const courseId=e.target.dataset.courseId;appState.settings.coursePublicSelections=appState.settings.coursePublicSelections||{};const course=appState.normalizedCourses.find(c=>c.ovpId===courseId)||{ovpId:courseId};const ids=new Set(getCoursePublicIds(course));if(e.target.checked)ids.add(e.target.dataset.coursePublicId);else ids.delete(e.target.dataset.coursePublicId);appState.settings.coursePublicSelections[courseId]=[...ids];renderAll();});container.querySelectorAll("button[data-reset-course-publics]").forEach(btn=>btn.onclick=()=>{delete (appState.settings.coursePublicSelections||{})[btn.dataset.resetCoursePublics];renderAll();});}

function findBiRanaMatchForCourse(course){const rows=appState.drupalSofiaMapping?.sofiaRows||[];const title=stripDrupalDepartmentPrefix(course?.title||"");if(!rows.length||!title)return null;const normalizedTitle=normalizeTitle(title);const scored=rows.map(r=>{const dispositif=normalizeTitle(r.dispositifLabel||"");const combined=normalizeTitle(r.combinedTitle||`${r.dispositifLabel||""} ${r.moduleLabel||""}`);const exact=!!normalizedTitle&&(normalizedTitle===dispositif||normalizedTitle===combined);const partial=!!normalizedTitle&&!!dispositif&&(dispositif.includes(normalizedTitle)||normalizedTitle.includes(dispositif));const score=exact?1:Math.max(keywordSimilarity(title,r.dispositifLabel||""),levenshteinSimilarity(title,r.dispositifLabel||""),keywordSimilarity(title,r.combinedTitle||""),partial?0.82:0);return {row:r,score,exact,status:biRanaMatchStatus(score,exact)};}).sort((a,b)=>b.score-a.score)[0];return scored&&scored.score>=0.55?scored:null;}

d.operation!=='delete');return `<tr><td>${escapeHtml(d.label)}</td><td>${escapeHtml(f.strict?d.before:(d.field==='title'?normalizeIntranetTitleForComparison(d.before):normTextComparable(d.before)))}</td><td>${d.operation==='delete'?'<span class="badge badge-error">SUPPRESSION DEMANDÉE</span>':escapeHtml(d.requested)}</td><td>${escapeHtml(d.state)}${d.strictDifferent?' <span class="badge badge-info">strict différent</span>':''}</td><td><label><input type="checkbox" data-change="${escapeHtml(key)}" ${checked?'checked':''}> appliquer</label><select data-op="${escapeHtml(key)}"><option value="none">ne pas modifier</option><option value="replace" ${d.operation==='replace'?'selected':''}>remplacer</option><option value="add" ${d.operation==='add'?'selected':''}>ajouter</option><option value="delete" ${d.operation==='delete'?'selected':''}>supprimer</option><option value="manual">valeur manuelle</option></select><input data-manual-value="${escapeHtml(key)}" placeholder="Autre valeur"></td><td><select><option>toutes les pages liées</option><option>page académique</option><option>certains départements</option><option>certains Node ID</option></select></td></tr>`}).join('')}</tbody></table></details>`}).join("");return `<div class="split"><div class="card"><h3>Étape 1 — Import demandes</h3><input type="file" id="intranetRequestFile" accept=".xlsx,.xls,.csv,.txt,.html"><div>${renderSummary(intranetState.requestSummary)}</div></div><div class="card"><h3>Étape 2 — Import recensement Drupal</h3><input type="file" id="intranetInventoryFile" accept=".xlsx,.xls,.csv,.html"><p>${escapeHtml(intranetState.inventoryFileName||'Aucun fichier')} — ${intranetState.inventoryRows.length} lignes — ${intranetState.inventorySheets.length} onglets (les noms et l'ordre sont mémorisés).</p></div></div><div class="card"><h3>Filtres et commandes</h3><input id="iuQ" value="${escapeHtml(f.q)}" placeholder="Recherche titre, ID, dispositif, Node ID, plan, département"><label><input type="checkbox" id="iu ove-preview]").forEach(b=>b.onclick=()=>{intranetState.excludedPreviewTargets[b.dataset.removePreview]=true;buildPreview();renderIntranetUpdates();});document.getElementById("iuRestoreExcluded")?.addEventListener("click",()=>{intranetState.excludedPreviewTargets={};buildPreview();renderIntranetUpdates();});document.getElementById("iuBuildPreview")?.addEventListener("click",()=>{buildPreview();renderIntranetUpdates();});document.getElementById("iuExportJson")?.addEventListener("click",exportCurrentUpdatePayload);document.getElementById("iuReport")?.addEventListener("change",e=>e.target.files[0]&&importIntranetReport(e.target.files[0]));document.getElementById("iuExportInventory")?.addEventListener("click",exportUpdatedInventory);["bulkQ","bulkSheet","bulkDept","bulkType"].forEach(id=>{const el=document.getElementById(id);if(el)el.oninput=el.onchange=()=>{const k={bulkQ:'q',bulkSheet:'sheet',bulkDept:'department',bulkType:'pageType'}[id];intranetState.bulk.filters[k]=el.value;renderIntranetUpdates();};});document.getElementById("bulkSelectAll")?.addEventListener("click",()=>{intranetState.inventoryRows.forEach(r=>r.nodeId&&intranetState.bulk.selected.add(r.nodeId));renderIntranetUpdates();});document.getElementById("bulkSelectVisible")?.addEventListener("click",()=>{bulkFilteredRows().forEach(r=>r.nodeId&&intranetState.bulk.selected.add(r.nodeId));renderIntranetUpdates();});document.getElementById("bulkClear")?.addEventListener("click",()=>{intranetState.bulk.selected.clear();renderIntranetUpdates();});document.getElementById("bulkSaveSel")?.addEventListener("click",()=>{intranetState.bulk.savedSelections.push({date:new Date().toISOString(),nodes:[...intranetState.bulk.selected]});localStorage.setItem("intranet_bulk_saved_selections",JSON.stringify(intranetState.bulk.savedSelections));showToast("Sélection sauvegardée.");});["bulkField","bulkLoc","bulkOperation","bulkTerms","bulkFrom","bulkTo"].forEach(id=>{const el=document.getElementById(id);if(el)el.onchange=el.oninput=()=>{const k={bulkField:'field',bulkLoc:'locationKind',bulkOperation:'operation',bulkTerms:'terms',bulkFrom:'fromTerm',bulkTo:'toTerm'}[id];intranetState.bulk[k]=el.value;};});document.getElementById("bulkPreview")?.addEventListener("click",buildBulkPreview);document.getElementById("bulkExport")?.addEventListener("click",exportBulkJson);document.getElementById("logJson")?.addEventListener("click",()=>downloadFile("journal-mises-a-jour.json",JSON.stringify(intranetState.log,null,2),"application/json"));document.getElementById("logCsv")?.addEventListener("click",()=>downloadFile("journal-mises-a-jour.csv",toCsv([["date","action","details"],...intranetState.log.map(l=>[l.date,l.action,JSON.stringify(l)])]),"text/csv"));document.getElementById("logXls")?.addEventListener("click",()=>downloadFile("journal-mises-a-jour.xls",`<table>${intranetState.log.map(l=>`<tr><td>${escapeHtml(l.date)}</td><td>${escapeHtml(l.action)}</td><td>${escapeHtml(JSON.stringify(l))}</td></tr>`).join('')}</table>`,"application/vnd.ms-excel"));document.getElementById("logReset")?.addEventListener("click",()=>{localStorage.removeItem("intranet_update_log");localStorage.removeItem("intranet_bulk_saved_selections");intranetState.log=[];intranetState.manualAssociations={};renderIntranetUpdates();});}

function getBulkThemePublicAliases(){return {nodeId:["Node ID Drupal","Node ID","NID","ID Drupal","Identifiant Drupal","Id"],pageUrl:["Lien vers la page","URL","Lien","Edit URL","Page Drupal"],title:["Titre","Titre du parcours","Title","Libellé"],theme:["Thématiques saisies","Thematiques saisies","Thématique","Thematique","Thématique Drupal","Theme","Rubrique"],publics:["Métiers","Metiers","Métiers ou publics","Metiers ou publics","Public concerné","Publics","Tags publics","Tags de publics","Public cible"],sourceOvp:["Source OVP","ID intention","Identifiant intention"],sheet:["Onglet","Feuille","Sheet"]};}
function getAnyColumnValue(row,aliases){for(const key of Object.keys(row||{})){if(key.startsWith("__"))continue;if(aliases.some(a=>normalizeColumnName(key)===normalizeColumnName(a)||normalizeColumnName(key).includes(normalizeColumnName(a))))return row[key];}return "";}
async function importBulkThemePublicInventory(file){const workbook=await readWorkbookOrSingle(file);const aliases=getBulkThemePublicAliases();bulkThemePublicState.fileName=file.name;bulkThemePublicState.rows=workbook.sheets.flatMap(sheet=>sheet.objects.map((raw,index)=>({sheetName:sheet.name,rowIndex:index+2,raw,nodeId:String(getAnyColumnValue(raw,aliases.nodeId)||"").trim(),pageUrl:String(getAnyColumnValue(raw,aliases.pageUrl)||"").trim(),title:String(getAnyColumnValue(raw,aliases.title)||"").trim(),theme:String(getAnyColumnValue(raw,aliases.theme)||"").trim(),themes:splitTags(getAnyColumnValue(raw,aliases.theme)),metiersPublics:splitTags(getAnyColumnValue(raw,aliases.publics)),sourceOvp:String(getAnyColumnValue(raw,aliases.sourceOvp)||"").trim()}))).filter(r=>r.nodeId||r.title);bulkThemePublicState.preview=[];bulkThemePublicState.errors=[];logIntranet("import_recensement_theme_public",{file:file.name,rows:bulkThemePublicState.rows.length});renderBulkThemePublicTab();}
function parseDrupalIdList(text){return unique(String(text||"").split(/[\s,;|]+/).map(x=>x.trim()).filter(Boolean));}
function computePublicsAfter(before,operation,values){const incoming=Array.isArray(values)?values:splitTags(values);if(operation==="add")return unique([...(before||[]),...incoming]);if(operation==="remove")return (before||[]).filter(x=>!incoming.some(y=>normTextComparable(x)===normTextComparable(y)));if(operation==="clear")return [];return unique(incoming);}
function flattenPublicLabels(nodes=PUBLIC_TREE){const out=[];const walk=(list,path=[])=>(list||[]).forEach(item=>{if(typeof item==="string")out.push([...path,item].join(" > "));else if(item?.label){const next=[...path,item.label];out.push(next.join(" > "));walk(item.children,next);}});walk(nodes);return unique(out);}
function toggleBulkThemeValue(value,checked){bulkThemePublicState.themeValues=checked?unique([...bulkThemePublicState.themeValues,value]):bulkThemePublicState.themeValues.filter(x=>x!==value);bulkThemePublicState.themeValue=bulkThemePublicState.themeValues.join("; ");}
function toggleBulkPublicValue(value,checked){bulkThemePublicState.metiersPublicsValues=checked?unique([...bulkThemePublicState.metiersPublicsValues,value]):bulkThemePublicState.metiersPublicsValues.filter(x=>x!==value);bulkThemePublicState.metiersPublicsValue=bulkThemePublicState.metiersPublicsValues.join("; ");}
function buildBulkThemePublicPreview(){const ids=parseDrupalIdList(bulkThemePublicState.idsText);const rowsById=new Map(bulkThemePublicState.rows.map(r=>[String(r.nodeId),r]));const themeValues=unique(bulkThemePublicState.themeValues.length?bulkThemePublicState.themeValues:splitTags(bulkThemePublicState.themeValue));const metiersPublicsValues=unique(bulkThemePublicState.metiersPublicsValues.length?bulkThemePublicState.metiersPublicsValues:splitTags(bulkThemePublicState.metiersPublicsValue));bulkThemePublicState.errors=ids.filter(id=>!rowsById.has(id)).map(id=>({nodeId:id,type:"node_not_found",message:"ID Drupal absent du recensement importé."}));bulkThemePublicState.preview=ids.map(id=>rowsById.get(id)).filter(Boolean).map(row=>{const changes={},expectedBefore={},expectedAfter={},expectedAfterContains={},warnings=[];if(themeValues.length||bulkThemePublicState.themeOperation==="clear"){expectedBefore.theme=row.themes||splitTags(row.theme);changes.theme={operation:bulkThemePublicState.themeOperation,values:computePublicsAfter(expectedBefore.theme,bulkThemePublicState.themeOperation,themeValues)};expectedAfter.theme=changes.theme.values;}if(metiersPublicsValues.length||bulkThemePublicState.metiersPublicsOperation==="clear"){expectedBefore.metiersPublics=row.metiersPublics;const values=bulkThemePublicState.metiersPublicsOperation==="add"?metiersPublicsValues:computePublicsAfter(row.metiersPublics,bulkThemePublicState.metiersPublicsOperation,metiersPublicsValues);changes.metiersPublics={operation:bulkThemePublicState.metiersPublicsOperation,values};if(bulkThemePublicState.metiersPublicsOperation==="add")expectedAfterContains.metiersPublics=metiersPublicsValues;else expectedAfter.metiersPublics=values;}if(!row.pageUrl)warnings.push("URL absente");if(changes.theme&&changes.theme.values.length===0)warnings.push("suppression de toutes les thématiques");if(changes.metiersPublics&&changes.metiersPublics.values.length===0)warnings.push(bulkThemePublicState.metiersPublicsValues.length?"Erreur : des métiers ont été sélectionnés mais aucun métier n’est présent dans le JSON.":"suppression de tous les métiers/publics Drupal");return {nodeId:row.nodeId,pageUrl:row.pageUrl,title:row.title,inventorySheet:row.sheetName,sourceOvp:row.sourceOvp,expectedBefore,changes,expectedAfter,expectedAfterContains,warnings,metiersActuels:row.metiersPublics,metiersAAjouter:changes.metiersPublics?.operation==="add"?changes.metiersPublics.values:[],metiersResultatAttendu:changes.metiersPublics?.operation==="add"?computePublicsAfter(row.metiersPublics,"add",changes.metiersPublics.values):(changes.metiersPublics?.values??row.metiersPublics)};}).filter(p=>Object.keys(p.changes).length);renderBulkThemePublicTab();}
function buildBulkThemePublicPayload(download=false){buildBulkThemePublicPreview();const now=new Date();const blocking=bulkThemePublicState.preview.some(p=>bulkThemePublicState.metiersPublicsValues.length&&(!p.changes.metiersPublics||!Array.isArray(p.changes.metiersPublics.values)||!p.changes.metiersPublics.values.length));if(blocking){const err={type:"empty_metiers_publics",message:"Erreur : des métiers ont été sélectionnés mais aucun métier n’est présent dans le JSON."};bulkThemePublicState.errors=unique([...bulkThemePublicState.errors.map(e=>JSON.stringify(e)),JSON.stringify(err)]).map(e=>JSON.parse(e));if(download){showToast(err.message);return null;}}const payload={type:"bulk_drupal_theme_public_update",version:"1.1",batchId:`bulk-theme-public-${now.toISOString().slice(0,10)}-${String(now.getTime()).slice(-4)}`,generatedAt:now.toISOString(),source:{inventoryFile:bulkThemePublicState.fileName},settings:{safeMode:bulkThemePublicState.safeMode,matchKey:"nodeId",fields:["theme","metiersPublics"]},selection:{drupalNodeIds:parseDrupalIdList(bulkThemePublicState.idsText),selectedCount:bulkThemePublicState.preview.length},targets:bulkThemePublicState.preview.map(p=>({nodeId:p.nodeId,pageUrl:p.pageUrl,title:p.title,inventorySheet:p.inventorySheet,sourceOvp:p.sourceOvp,expectedBefore:p.expectedBefore,changes:p.changes,expectedAfter:p.expectedAfter,expectedAfterContains:p.expectedAfterContains})),errors:bulkThemePublicState.errors};bulkThemePublicState.lastPayload=payload;if(download){downloadFile(`maj-thematiques-publics-${dateStamp()}.json`,JSON.stringify(payload,null,2),"application/json");logIntranet("export_json_theme_public",{targets:payload.targets.length,errors:payload.errors.length,batchId:payload.batchId});}return payload;}
function renderBulkThemePublicTab(){const panel=document.getElementById("tab-bulk-theme-public");if(!panel)return;const ids=parseDrupalIdList(bulkThemePublicState.idsText),publicOptions=flattenPublicLabels();const themeChecks=THEMES.map(v=>`<label style="display:block"><input type="checkbox" data-btp-theme="${escapeHtml(v)}" ${bulkThemePublicState.themeValues.includes(v)?"checked":""}> ${escapeHtml(v)}</label>`).join("");const publicChecks=publicOptions.map(v=>`<label style="display:block"><input type="checkbox" data-btp-public="${escapeHtml(v)}" ${bulkThemePublicState.metiersPublicsValues.includes(v)?"checked":""}> ${escapeHtml(v)}</label>`).join("");const payload=bulkThemePublicState.lastPayload||{type:"bulk_drupal_theme_public_update",version:"1.1",targets:bulkThemePublicState.preview,errors:bulkThemePublicState.errors};panel.innerHTML=`<div class="card"><h2>MAJ massive des thématiques et publics par ID Drupal</h2><p>Le recensement analyse les colonnes <strong>Thématiques saisies</strong> et <strong>Métiers</strong>. Sélectionnez plusieurs valeurs à ajouter, retirer ou remplacer.</p></div><div class="split"><div class="card"><h3>1. Recensement Drupal</h3><input type="file" id="btpInventory" accept=".xlsx,.xls,.csv,.html,.txt"><p><strong>${escapeHtml(bulkThemePublicState.fileName||"Aucun fichier")}</strong> — ${bulkThemePublicState.rows.length} lignes.</p></div><div class="card"><h3>2. ID Drupal concernés</h3><textarea id="btpIds" rows="8" style="width:100%" placeholder="2524, 2525, 2526">${escapeHtml(bulkThemePublicState.idsText)}</textarea><p>${ids.length} ID saisis — ${bulkThemePublicState.preview.length} trouvés — ${bulkThemePublicState.errors.length} introuvables.</p></div></div><div class="split"><div class="card"><h3>3. Thématiques</h3><select id="btpThemeOperation"><option value="add" ${bulkThemePublicState.themeOperation==='add'?'selected':''}>ajouter</option><option value="remove" ${bulkThemePublicState.themeOperation==='remove'?'selected':''}>retirer</option><option value="replace" ${bulkThemePublicState.themeOperation==='replace'?'selected':''}>remplacer toutes</option><option value="clear" ${bulkThemePublicState.themeOperation==='clear'?'selected':''}>vider</option></select><select id="btpThemeMenu"><option value="">Choisir une thématique…</option>${THEMES.map(v=>`<option>${escapeHtml(v)}</option>`).join("")}</select><div class="public-tree" style="margin-top:8px">${themeChecks}</div></div><div class="card"><h3>4. Métiers / publics Drupal</h3><select id="btpMetiersPublicsOperation"><option value="add" ${bulkThemePublicState.metiersPublicsOperation==='add'?'selected':''}>ajouter</option><option value="remove" ${bulkThemePublicState.metiersPublicsOperation==='remove'?'selected':''}>retirer</option><option value="replace" ${bulkThemePublicState.metiersPublicsOperation==='replace'?'selected':''}>remplacer tous</option><option value="clear" ${bulkThemePublicState.metiersPublicsOperation==='clear'?'selected':''}>vider</option></select><select id="btpPublicMenu"><option value="">Choisir un public…</option>${publicOptions.map(v=>`<option>${escapeHtml(v)}</option>`).join("")}</select><div class="public-tree" style="margin-top:8px">${publicChecks}</div></div></div><div class="card"><label><input type="checkbox" id="btpSafeMode" ${bulkThemePublicState.safeMode?'checked':''}> safeMode</label><div class="actions"><button id="btpPreview">Prévisualiser</button><button class="primary" id="btpExport">Exporter JSON thématiques/publics</button></div></div><div class="card"><h3>5. Retour du recensement et aperçu</h3><table class="table"><thead><tr><th>Node ID</th><th>Titre</th><th>Thématiques saisies</th><th>Thématiques futures</th><th>Métiers actuellement recensés</th><th>Métiers à ajouter</th><th>Résultat attendu</th><th>changes.metiersPublics exporté</th><th>Alertes</th></tr></thead><tbody>${bulkThemePublicState.preview.map(p=>`<tr><td>${escapeHtml(p.nodeId)}</td><td>${escapeHtml(p.title)}</td><td>${escapeHtml((p.expectedBefore.theme||[]).join('; '))}</td><td>${escapeHtml((p.expectedAfter.theme||[]).join('; '))}</td><td>${escapeHtml((p.expectedBefore.metiersPublics||[]).join('; '))}</td><td>${escapeHtml((p.metiersAAjouter||[]).join('; '))}</td><td>${escapeHtml((p.metiersResultatAttendu||[]).join('; '))}</td><td><pre>${escapeHtml(JSON.stringify(p.changes.metiersPublics||{},null,2))}</pre></td><td>${p.warnings.map(w=>`<span class="badge badge-warning">${escapeHtml(w)}</span>`).join(' ')}</td></tr>`).join('')||'<tr><td colspan="9">Importez le recensement, saisissez les ID puis prévisualisez.</td></tr>'}</tbody></table></div><div class="card"><h3>JSON généré</h3><div class="code-block">${escapeHtml(JSON.stringify(payload,null,2))}</div></div>`;bindBulkThemePublicEvents();}
function bindBulkThemePublicEvents(){document.getElementById("btpInventory")?.addEventListener("change",e=>e.target.files[0]&&importBulkThemePublicInventory(e.target.files[0]).catch(err=>showToast("Erreur import recensement: "+err.message)));document.getElementById("btpIds")?.addEventListener("input",e=>bulkThemePublicState.idsText=e.target.value);document.getElementById("btpThemeOperation")?.addEventListener("change",e=>bulkThemePublicState.themeOperation=e.target.value);document.getElementById("btpMetiersPublicsOperation")?.addEventListener("change",e=>bulkThemePublicState.metiersPublicsOperation=e.target.value);document.getElementById("btpThemeMenu")?.addEventListener("change",e=>{if(e.target.value){toggleBulkThemeValue(e.target.value,true);renderBulkThemePublicTab();}});document.getElementById("btpPublicMenu")?.addEventListener("change",e=>{if(e.target.value){toggleBulkPublicValue(e.target.value,true);renderBulkThemePublicTab();}});document.querySelectorAll("[data-btp-theme]").forEach(i=>i.onchange=()=>toggleBulkThemeValue(i.dataset.btpTheme,i.checked));document.querySelectorAll("[data-btp-public]").forEach(i=>i.onchange=()=>toggleBulkPublicValue(i.dataset.btpPublic,i.checked));document.getElementById("btpSafeMode")?.addEventListener("change",e=>bulkThemePublicState.safeMode=e.target.checked);document.getElementById("btpPreview")?.addEventListener("click",buildBulkThemePublicPreview);document.getElementById("btpExport")?.addEventListener("click",()=>buildBulkThemePublicPayload(true));}

function renderAll(){ensureDefaultSelectedPublics();restoreCachedBiRanaMapping(true);autoAssociateAllCourses();renderOvpCourses();renderSofiaRows();renderAutoAssociations();renderManualAssociations();renderDrupalPreview();renderExports();renderDrupalSofiaMapping();renderQualityChecks();renderIntranetUpdates();renderBulkThemePublicTab();}

document.getElementById("saveStateBtn").onclick=saveState;document.getElementById("restoreStateBtn").onclick=restoreState;document.getElementById("resetStateBtn").onclick=resetState;
renderTabs();renderAll();
